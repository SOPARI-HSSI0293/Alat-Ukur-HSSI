        // --- HTML TEMPLATES ---

        const getCekAlatHTML = () => `
            <div class="max-w-4xl mx-auto">

                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Tanggal Pelaksanaan Aktual <span class="text-red-500">*</span></label>
                            <input type="date" id="input-tgl-aktual" required class="w-full p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Judgement Hasil <span class="text-red-500">*</span></label>
                            <select id="input-judgement" required class="w-full p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white">
                                <option value="" disabled selected>Pilih Hasil Pengecekan</option>
                                <option value="OK">OK (Sesuai Standar)</option>
                                <option value="Perlu Adjust">Perlu Adjust (Dikalibrasi Ulang)</option>
                                <option value="NG">NG (Tidak Lolos / Broken)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">PIC / Kalibrator <span class="text-red-500">*</span></label>
                            <input type="text" id="input-pic" required placeholder="Nama personil lapangan" class="w-full p-2.5 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Upload Berkas Pendukung PDF <span class="text-sm font-normal text-slate-400">(Opsional, Maks 3MB)</span></label>
                        <input type="file" id="input-file-pdf" accept="application/pdf" class="w-full p-2 border border-slate-300 rounded text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="pt-4 border-t border-slate-100 flex justify-end gap-3">
                        <button type="submit" id="btn-submit" class="px-5 py-2.5 bg-blue-600 text-white rounded hover:bg-blue-700 font-medium flex items-center gap-2 shadow-sm transition-colors">

        const getSetupHTML = () => `
            <div id="setup-pin-container" class="max-w-md mx-auto bg-white p-8 rounded-xl border border-slate-200 shadow-sm text-center mt-10">
                <div class="w-16 h-16 bg-slate-100 text-slate-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl"><i class="fas fa-shield-alt"></i></div>
                <h2 class="text-xl font-bold text-slate-800 mb-2">Akses Terbatas</h2>
                <p class="text-sm text-slate-500 mb-6">Hanya Supervisor/Admin yang berwenang. Masukkan Master PIN untuk mengubah standar interval.</p>
                <input type="password" id="input-pin" class="w-full p-3 bg-slate-50 border border-slate-300 rounded text-center tracking-[0.5em] focus:ring-2 focus:ring-blue-500 outline-none mb-4 text-lg font-bold" placeholder="••••••••" onkeyup="if(event.key === 'Enter') verifyPin()">
                <button onclick="verifyPin()" class="w-full px-5 py-3 bg-slate-800 text-white rounded hover:bg-slate-700 font-bold transition-colors">Buka Akses</button>
                <p id="pin-error" class="text-red-500 text-sm mt-3 font-medium hidden"><i class="fas fa-exclamation-circle mr-1"></i> Otorisasi Gagal. PIN tidak terdaftar.</p>

            <div id="setup-content-container" class="hidden">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm h-fit">
                        <h3 class="font-bold text-slate-800 mb-4 border-b pb-2"><i class="fas fa-edit text-blue-600 mr-2"></i> Tambah / Update Aturan</h3>
                        <form onsubmit="submitSetupForm(event)" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Kategori / Nama Alat <span class="text-red-500">*</span></label>
                                <input type="text" id="setup-nama-alat" required placeholder="Contoh: CALIPER 150MM" class="w-full p-2 border border-slate-300 rounded uppercase focus:ring-2 focus:ring-blue-500 outline-none">

                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Periode Kalibrasi (Bulan) <span class="text-red-500">*</span></label>
                                <input type="number" id="setup-periode" required min="1" max="60" placeholder="Contoh: 6" class="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 outline-none">

                        </div>

                            <table class="w-full text-sm text-left">
                                <thead class="bg-white text-slate-500 uppercase text-xs border-b sticky top-0">
                                    <tr>
                                        <th class="px-6 py-3 font-semibold">Nama Kategori Alat</th>
                                        <th class="px-6 py-3 font-semibold text-center">Periode Standard</th>
                                    </tr>
                                </thead>
                                <tbody id="setup-table-body" class="divide-y divide-slate-100">
                                    <tr><td colspan="2" class="px-6 py-8 text-center text-slate-400 italic"><i class="fas fa-spinner fa-spin mr-2"></i> Memuat ruleset...</td></tr>
                                </tbody>
                            </table>

                    </div>
                </div>
            </div>
        `;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const navLabels = document.querySelectorAll('.nav-label');
            const logoText = document.getElementById('logo-text');
            
            if (sidebar.classList.contains('w-64')) {
                sidebar.classList.replace('w-64', 'w-20');
                mainContent.classList.replace('ml-64', 'ml-20');
                logoText.classList.add('hidden');
                navLabels.forEach(label => label.classList.add('hidden'));
            } else {
                sidebar.classList.replace('w-20', 'w-64');
                mainContent.classList.replace('ml-20', 'ml-64');
                logoText.classList.remove('hidden');
                setTimeout(() => { navLabels.forEach(label => label.classList.remove('hidden')); }, 150);
            }
        }

        function switchView(viewName) {
            // Matikan kamera secara paksa jika sedang menyala dan berpindah tab
            stopQrScanner();

            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('nav-active');
                btn.classList.add('nav-inactive');
            });
            document.getElementById(`nav-${viewName}`).classList.add('nav-active');
            document.getElementById(`nav-${viewName}`).classList.remove('nav-inactive');
            document.getElementById('page-title').innerText = pageTitles[viewName];

            if (viewName === 'dashboard') {
                document.getElementById('view-container').innerHTML = getDashboardHTMLFull(); loadDashboardData();
            } else if (viewName === 'cek') {
                document.getElementById('view-container').innerHTML = getCekAlatHTML();
                setTimeout(() => document.getElementById('cek-no-alat').focus(), 100);
            } else if (viewName === 'alert') {
                loadAlertData();
            } else if (viewName === 'master') {
                loadMasterData();
            } else if (viewName === 'riwayat') {
                loadRiwayatData();
            } else if (viewName === 'update') {
                document.getElementById('view-container').innerHTML = getUpdateFormHTML();
            } else if (viewName === 'setup') {
                document.getElementById('view-container').innerHTML = getSetupHTML();
                if(isSetupUnlocked) {
                    document.getElementById("setup-pin-container").classList.add("hidden");
                    document.getElementById("setup-content-container").classList.remove("hidden");
                    loadSetupData();
                }
            }
        }

        // ================= FITUR QR SCANNER & CEK ALAT ================= //

        function startQrScanner() {
            document.getElementById('qr-reader-container').classList.remove('hidden');
            document.getElementById('cek-result-container').innerHTML = ''; // Clear result
            
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("qr-reader");
            }
            
            html5QrCode.start(
                { facingMode: "environment" }, // Pakai kamera belakang
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText, decodedResult) => {
                    // Berhasil scan
                    document.getElementById('cek-no-alat').value = decodedText;
                    stopQrScanner();
                    actionCekAlat(); // Eksekusi pencarian otomatis
                },
                (errorMessage) => {
                    // Abaikan error frame (wajar saat kamera mencari QR)
                }
            ).catch((err) => {
                alert("Gagal mengakses kamera piranti: " + err);
                document.getElementById('qr-reader-container').classList.add('hidden');
            });
        }

        function stopQrScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                }).catch(err => console.log("Stop failed:", err));
            }
            let container = document.getElementById('qr-reader-container');

        const readPdfAsBase64 = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        };

        async function submitUpdateForm(e) {
            e.preventDefault(); 
            const btnSubmit = document.getElementById('btn-submit');
            const alertBox = document.getElementById('update-alert');
            const fileInput = document.getElementById('input-file-pdf');
            btnSubmit.disabled = true; btnSubmit.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Mengunggah & Memproses...`;
            alertBox.classList.add('hidden');

            try {
                let fileDataBase64 = null; let fileNameText = "";
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    if (file.size > 3 * 1024 * 1024) throw new Error("Ukuran file PDF maksimal 3 MB.");
                    if (file.type !== "application/pdf") throw new Error("Ekstensi file wajib PDF.");
                    fileDataBase64 = await readPdfAsBase64(file); fileNameText = file.name;
                }

                const payload = {
                    nomorAlat: document.getElementById('input-no-alat').value.trim().toUpperCase(),
                    tglEksekusi: document.getElementById('input-tgl-aktual').value,
                    judgement: document.getElementById('input-judgement').value,
                    picKalibrasi: document.getElementById('input-pic').value,
                    fileData: fileDataBase64, fileName: fileNameText
                };

                let response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST', body: JSON.stringify({ action: "updateKalibrasi", payload: payload }) 
                });
                let textResult = await response.text();
                let result;
                try { result = JSON.parse(textResult); } catch (jsonError) { throw new Error("HTML Error/Izin."); }

                alertBox.classList.remove('hidden');
                if (result.status === "success") {
                    alertBox.className = "mt-4 p-4 rounded text-sm font-medium bg-emerald-100 text-emerald-800 border border-emerald-200";
                    alertBox.innerHTML = `<i class="fas fa-check-circle mr-2"></i> ${result.message}`;
                    document.getElementById('form-update').reset(); 
                } else {
                    alertBox.className = "mt-4 p-4 rounded text-sm font-medium bg-red-100 text-red-800 border border-red-200";
                    alertBox.innerHTML = `<i class="fas fa-exclamation-triangle mr-2"></i> Gagal: ${result.message}`;
                }
            } catch (error) {
                alertBox.classList.remove('hidden');
                alertBox.className = "mt-4 p-4 rounded text-sm font-medium bg-red-100 text-red-800 border border-red-200";
                alertBox.innerHTML = `<i class="fas fa-exclamation-circle mr-2"></i> Aplikasi Error: ${error.message}`;
            }
            btnSubmit.disabled = false; btnSubmit.innerHTML = `<i class="fas fa-cloud-upload-alt"></i> Kirim & Sinkronisasi`;
        }

                if(item.judgement.toUpperCase() === "OK") badge = `<span class="px-2 py-1 bg-emerald-100 text-emerald-700 rounded text-xs font-bold">OK</span>`;
                else if(item.judgement.toUpperCase() === "NG") badge = `<span class="px-2 py-1 bg-red-100 text-red-700 rounded text-xs font-bold">NG</span>`;
                else badge = `<span class="px-2 py-1 bg-amber-100 text-amber-700 rounded text-xs font-bold">${item.judgement}</span>`;
                let linkDoc = (item.linkDokumen && item.linkDokumen.startsWith("http")) ? `<a href="${item.linkDokumen}" target="_blank" class="text-blue-600 hover:text-blue-800 font-medium"><i class="fas fa-file-pdf"></i> Buka</a>` : `<span class="text-slate-400">-</span>`;
                tableHTML += `<tr class="hover:bg-slate-50 transition-colors data-row-riwayat">
                    <td class="px-4 py-3 font-mono text-xs text-slate-500">${item.idTransaksi}</td><td class="px-4 py-3 font-bold text-slate-800">${item.nomorAlat}</td>
                    <td class="px-4 py-3">${item.tglEksekusi}</td><td class="px-4 py-3 text-center">${badge}</td><td class="px-4 py-3">${item.pic}</td>
                    <td class="px-4 py-3 text-xs text-slate-500">${item.admin}</td><td class="px-4 py-3 text-center">${linkDoc}</td></tr>`;
            });
            container.innerHTML = tableHTML + `</tbody></table></div></div>`;
        }

        function filterRiwayatData() {
            let input = document.getElementById("search-riwayat").value.toUpperCase();
            let rows = document.querySelectorAll("#table-riwayat tbody .data-row-riwayat");
            rows.forEach(row => { row.style.display = (row.innerText.toUpperCase().indexOf(input) > -1) ? "" : "none"; });
        }

                        <h2 class="text-base font-semibold text-gray-700 m-0 mt-1">Quality Control Department</h2>

                    <thead><tr><th rowspan="2" class="p-2 w-12">No</th><th rowspan="2" class="p-2">Poin Pengecekan (Item Check)</th><th rowspan="2" class="p-2">Standar / Toleransi</th><th colspan="3" class="p-2">Hasil Aktual</th><th rowspan="2" class="p-2">Judgement<br>(OK/NG)</th></tr>
                    <tr><th class="p-1 w-16">1</th><th class="p-1 w-16">2</th><th class="p-1 w-16">3</th></tr></thead>
                    <tbody><tr class="h-10"><td>1</td><td class="text-left px-2">Kondisi Fisik & Slider</td><td class="text-left px-2">Mulus, tidak seret</td><td></td><td></td><td></td><td></td></tr>

                    <tr class="h-10"><td>3</td><td class="text-left px-2">Akurasi Pengukuran Blok 10mm</td><td class="text-left px-2">± 0.02 mm</td><td></td><td></td><td></td><td></td></tr>

                    <tr class="h-10"><td>5</td><td></td><td></td><td></td><td></td><td></td><td></td></tr></tbody>

                    <tr><td class="w-1/3 p-2 font-semibold bg-gray-50">Dibuat Oleh (Kalibrator)</td><td class="w-1/3 p-2 font-semibold bg-gray-50">Diperiksa Oleh (QC SPV)</td><td class="w-1/3 p-2 font-semibold bg-gray-50">Tgl Pelaksanaan Aktual</td></tr>
                    <tr><td class="h-24 align-bottom p-2">( ................................... )</td><td class="h-24 align-bottom p-2">( ................................... )</td><td class="h-24 align-middle p-2 text-lg font-bold">___ / ___ / 20___</td></tr>
                </table>
                <div class="mt-4 text-xs italic text-gray-600">* Formulir dikembalikan ke Admin PPC/QC maks 1x24 jam setelah pelaksanaan.</div>
            </div>`;
        }

        function printSingleAlertForm(index) {
            let itemData = window.currentAlertData[index];
            if (!itemData) return; document.getElementById('print-area').innerHTML = generateFormTemplate(itemData); window.print();
        }

        function printBulkAlertForms() {
            if (!window.currentAlertData || window.currentAlertData.length === 0) return;
            document.getElementById('print-area').innerHTML = window.currentAlertData.map(item => generateFormTemplate(item)).join(''); window.print();
        }

        document.addEventListener("DOMContentLoaded", () => { switchView('dashboard'); });
    </script>
</body>
</html>
